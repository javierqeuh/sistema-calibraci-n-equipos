 </header>

  <div class="container">
    <h1>Crear Nueva Encuesta</h1>
    
    <form id="survey-form" class="card">
      <input type="text" id="survey-title" placeholder="Título de la encuesta" required>
      <textarea id="survey-description" placeholder="Descripción" rows="3"></textarea>
      <label for="survey-deadline">Fecha límite: </label>
      <input type="datetime-local" id="survey-deadline" placeholder="Fecha límite">
      <label class="form-check">
        <input type="checkbox" id="survey-is-mandatory"> ¿Es obligatoria para todos?
      </label>

      <h3 style="margin-top: 20px;">Preguntas</h3>
      <div id="questions-container">
        <!-- Las preguntas se insertarán aquí dinámicamente -->
      </div>

      <button type="button" id="add-question-btn">+ Agregar pregunta</button>

      <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button type="button" id="save-draft-btn" class="secondary">Guardar borrador</button>
        <button type="submit" id="publish-btn">Publicar</button>
      </div>
    </form>
  </div>

  <!-- Plantilla para una nueva pregunta (oculta) -->
  <template id="question-template">
    <div class="question-block card" style="background: #f8f9fa; border: 1px solid #dee2e6;">
        <button type="button" class="remove-question-btn danger" style="float: right; width: auto; padding: 5px 10px;">X</button>
        <input type="text" class="question-text" placeholder="Texto de la pregunta" required>
        <label class="form-check">
          <input type="checkbox" class="question-is-mandatory"> Obligatoria
        </label>
        <select class="question-type">
          <option value="texto">Texto libre</option>
          <option value="opcion_multiple">Opción múltiple</option>
          <option value="escala_1_5">Escala (1-5)</option>
        </select>
        <div class="options-container" style="display: none; margin-top: 10px;">
          <!-- Las opciones se insertarán aquí -->
          <button type="button" class="add-option-btn secondary" style="width: auto; padding: 5px 10px;">+ Agregar opción</button>
        </div>
    </div>
  </template>
