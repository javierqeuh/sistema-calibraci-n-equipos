        <p><strong>Rol:</strong> <span id="header-user-role">...</span></p>
        <p><strong>Estado:</strong> <span id="header-user-status">...</span></p>
      </div>
      <div class="user-avatar">👤</div>
      <span class="logout-btn">Cerrar Sesión</span>
    </div>
  </div>

  <!-- Navegación -->
   <div class="nav-bar">
  <!-- Fila 1 -->
  <div class="nav-item" data-target="dashboard.html">
    <i class="fas fa-tachometer-alt"></i> Dashboard

  </div>

  <div class="nav-item" data-target="resultados-y-reportes.html">

    <i class="fas fa-users-cog"></i> Asignación

  <div class="separator"></div>

  <div class="nav-item" data-target="gestionar-usuario.html">
    <i class="fas fa-user-shield"></i> Gestion De Usuarios
  </div>

  <!-- Fila 2 -->
  <div class="nav-item notification-badge" data-target="notificaciones.html">
    <i class="fas fa-bell"></i> Notificaciones
    <span class="badge">1</span>
  </div>
  <div class="separator"></div>

  <div class="nav-item" data-target="perfil.html">
    <i class="fas fa-user"></i> Mi Perfil
  </div>

<div class="nav-item" data-target="responder-encuesta.html">

  </div>
</div>
 </header>

  <div class="container">
    <h1>Mi Perfil</h1>
    
    <div class="card" style="text-align: center; margin-bottom: 30px;">
      <div style="width: 100px; height: 100px; background: #007bff; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: white; font-size: 40px;">J</div>
      <h3 id="profile-header-name">Cargando...</h3>
    </div>
    
    <div class="card" id="profile-form">
      <input type="text" id="profile-nombre" placeholder="Nombre">
      <input type="text" id="profile-apellidos" placeholder="Apellidos">
      <input type="email" id="profile-email" placeholder="Email">
      <input type="text" id="profile-rol" placeholder="Rol" disabled style="background: #f0f0f0;">
      <label style="display: flex; align-items: center; gap: 10px;">
        <input type="checkbox" checked> Recibir notificaciones por email
      </label>
      <button id="save-profile-btn" style="margin-top: 20px;">Guardar cambios</button>
    </div>
  </div> 

 <script src="/logica_interfaz/common.js" defer></script>
  <script src="/logica_interfaz/navigation.js" defer></script>
